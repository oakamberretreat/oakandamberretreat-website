<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Oak & Amber Retreat</title>
    <style>
        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .thank-you-box {
            background: #ffffff;
            padding: 60px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            max-width: 500px;
            width: 90%;
        }
        h1 {
            color: #b38728;
            font-size: 32px;
            margin-bottom: 15px;
            margin-top: 0;
        }
        p {
            color: #555555;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            padding: 15px 30px;
            background-color: #212529;
            color: #ffffff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.3s ease;
        }
        .btn:hover {
            background-color: #b38728;
        }
    </style>
</head>
<body>
    <div class="thank-you-box">
        <h1>Request Received</h1>
        <p>Thank you for reaching out to Oak & Amber Retreat. Our team will review your inquiry and get back to you shortly to confirm the details of your stay.</p>
        <a href="index.html" class="btn">Return to Homepage</a>
    </div>
</body>
</html>
